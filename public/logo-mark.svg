<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Hissa">
  <title>Hissa — share certificate</title>
  <rect width="256" height="256" fill="#f1ebe1"/>

  <!-- Certificate frame: double border (book-series family) -->
  <rect x="22" y="22" width="212" height="212" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="30" y="30" width="196" height="196" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- Top caption -->
  <line x1="58" y1="62" x2="100" y2="62" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="156" y1="62" x2="198" y2="62" stroke="#1a1a1a" stroke-width="0.8"/>
  <text x="128" y="66" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="11" letter-spacing="5" fill="#1a1a1a">HISSA</text>

  <!-- Big share number — the centerpiece -->
  <text x="128" y="138" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-weight="900" font-size="64" fill="#1a1a1a">0.5%</text>

  <!-- Signature rule -->
  <line x1="58" y1="160" x2="198" y2="160" stroke="#1a1a1a" stroke-width="1"/>
  <text x="58" y="172" font-family="Inter, sans-serif" font-weight="600" font-size="7" letter-spacing="2" fill="#1a1a1a" opacity="0.55">ISSUED TO</text>

  <!-- Recipient lines (handwriting placeholder) -->
  <rect x="58"  y="182" width="92" height="2" fill="#1a1a1a" opacity="0.35"/>
  <rect x="58"  y="194" width="68" height="2" fill="#1a1a1a" opacity="0.35"/>

  <!-- Bottom-right circular seal -->
  <circle cx="190" cy="194" r="22" fill="none" stroke="#c1502e" stroke-width="1.5"/>
  <circle cx="190" cy="194" r="15" fill="#c1502e"/>
  <path d="M190 188 L195 194 L190 200 L185 194 Z" fill="#f1ebe1"/>

  <!-- Diamond punctuation, lower-left -->
  <path d="M58 210 L62 214 L58 218 L54 214 Z" fill="#c89b27"/>
</svg>
